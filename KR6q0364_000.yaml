front:
  text: 壽昌見如大師語錄序古德睦州尊宿于其兒孫傳燈一派若寥寥也而豫識臨濟以遮陰激發雲門以轢鑽雖濟嗣黃檗門嗣雪峰然其當機手眼開先一著實出睦州竟成兩宗之兒孫咸其法派矣而睦州不受其名也如此作用奚啻馬駒踏殺氣宇如王哉余甞妄憶吾夫子開源千古包孕三才而每於人不知處不患不慍一部論語重叠言之其義何居葢之智愚賢不肖纔動口間聞一不字便為色變而理學事功名儒碩輔一爭異同祖分左右動成仇敵可見求知一念從俱生無明同來縱使諸緣漸却而此念慍患難以頓忘古云老莊未免于有故每以無訓人可見夫子未免于知故屢以不患不慍訓人也至於無言莫知之嘆末後一語輙歸之天而一見老子服為龍遯世不悔歸之唯聖屢空之旨獨許顏回兩端之竭偕之鄙夫此又莫知之歸宿處也夫子果于知處立根否耶壽昌之下有見公者親授證據乃于沒踪跡處藏身不立一字不發一語數十年矣因與海岸居士一言投契露其本色方知有見公也及浪公歸掃壽昌之墖欣然以法席相推故余竊以睦州擬之令公不遇海岸則將口挂壁上不值浪公則終為古廟香爐去乎救世婆心殆不其然海岸居士所至如博山如瀛山如天童如徑山何地不為宗門建幟而壽昌一席有浪公以為重新法音所遍總見公一人之力也余讀公指據錄無一字一句不具殺刀活劒令人進步無門轉身有地全機大用具此錄中而公夷然不屑也龍德而隱夫子服膺世尊見之必為默識矣陳尊宿之擬余自以為知言不知海岸浪公作何證據也干戈剝及床膚不日當趨侍兩師其以蒲鞋為行脚錢乎貽公以博一咲崇禎十一年戊寅中秋日北京吏部尚書楚黃居士李長庚拜撰向上一路千聖不傳歷代祖師何處下口然諸方說禪浩浩地雷轟電馳皆是方便門庭不得已而屙撒耳是以亮公撒手入山不屑以口舌為佛事別行一路無處尋他余甞求宗匠於今時而心服壽昌見公之大用也公於臨濟三頓棒話發明本來而韜晦叢林屢推不出偶有一言半句皆端伯䖍請而後示之然猶秘不輕傳天下想望其光明而不得見於是入室弟子陰錄而刻行之初非大師之本意也大師發明大事之機緣具載錄中故先壽昌末後復以衲衣付之而公密用潛行如愚若魯諸方所以服其行解超羣也今人偶有見處便思迸出頭來聞大師之高風不覺爽然自失矣故為拈出以示作家崇禎丁丑中秋日法弟黃端伯和南題目次序文示眾頌古問答偈讚佛事行實
