body:
  text: 門人道璞集示衆若論此事如箭之徑擬議得來喪身失命通玄兮不履長安出格兮隨方信步惟有黃龍峰拗捩不信口皮只信悟悟箇甚麼鎮州蘿蔔頭角露咄直須吐却始得示衆舉世尊涅槃示現雙趺師云伸不伸縮不縮亦非驢頭并馬腳設有人道似冬瓜抱頭笑倒空王殿角笑倒且置的的當當一句作麼生道彈指一下云確示衆無眼沒鼻孔佛祖莫能窮老僧通一線不在語言中且道在甚麼處中央并上下南北及西東雖然如是亦要一回親見始得示衆俱胝一指禪啞子喫黃連談玄難出口抖擻向人天空海嶽徹山川百千三昧指頭邊咄明眼人前不得錯舉示衆乾屎橛一千七百都漏泄大千沙界熱漫漫虗空拗斷成幾節出誵訛入虎穴夏至嚴寒冬至熱狸奴白牯少知音獨許寒山笑不徹咄也是眼中著屑示衆舉狗子佛性有無話師云老老大大口生口熟有時火𦦨彌天有時氷霜滿地直饒掀翻海嶽倒轉須彌總是乾弄一場燈節示衆者箇燈籠通身是口教行便行教走便走出沒無端藏身北斗混亂乾坤不分先後上無師傅下無授續佛心燈全身拶透示衆拈花未免窠臼儱侗頭陀破顏揚臭觸著些兒逼塞宇宙纍及兒孫淵深難究晴空霹𮦷一聲蛙鐵牛脫索誠無謬示衆拈拄杖云拄杖子活如龍神功妙用應現無窮身非四大智具六通即凡即聖不落偏中人天敬仰佛祖欽崇淨裸裸赤灑灑八面真風靈光普遍太煞玲瓏居止同伴時人不逢復卓一下云追蹤覓迹渾無有應事臨機合至公示衆丈六金身一莖草衲僧坐斷剛剛好驀地掀翻正令行何如傾出一栲栳示衆圓陀陀光爍爍無頭無尾最難捉摸縱使老胡看得明也是虗空貫索任彼鼻孔撩天到此依他者著雖然祇個郎當撞破許多變博噫不是你跨上金毛背一定打折驢腳示衆榾柮子無根蒂眼耳鼻舌都無却解頂天立地四方八面坦然平諸佛衆生無忌諱瞥然撞著赤鬚胡掀倒蒼天難出氣難出氣狸奴白牯笑鈍置笑箇甚麼四腳稍天𭺗不起耳示衆砒礵本是殺人刀要在醫王善自操殺活不須稱妙手病原摸著始為高珍重示衆初心學道立志堅強二六時中要秉干將降魔伏崇截斷情殃話頭綿密自發心光含天裹地剎剎全彰始稱學道名報法王誡汝參學悟達故鄉思之不已參之再詳著意須當真實究翻轉乾坤做一場示衆參禪一著如火裏藏身任彼鐵膽銅心于斯定成融變耳然雖如是也須虗空粉碎大地平沈方有轉身之路恁麼時才好喫棒示衆參禪學道原為生死兩字不為別事所謂別事者何即今生心動念處便是有作有為便是有取有捨便是有修有證便是有淨有穢便是有聖有凡便是有佛有衆生便是乃至作頌作偈便是作詩作賦便是論禪論道便是論是論非便是論古論今便是種種作法不是為生死兩字上事總是別事實要為生死兩字不須外求只向穿衣喫飯處屙屎放尿處行住坐臥處一切處不得絲毫走作如人見猛虎相似一味躲身逃命又如人上陳只是要殺却賊魁取頭到手方休管甚取捨淨穢凡聖是非等耶不然盡是虗費工夫何日得箇太平時節也如此做去于生死兩字有少分相應不然盡是作有為之事於道無益先和尚云莫拘小享直須到古人田地始得生死自由不然盡是生死岸頭邊事實無了期也珍重示衆參禪學道人須要立箇堅固志具一副大心腸畢竟要與諸佛同行諸祖同坐具此心者方可參禪學道不然捨父母棄恩愛剃髮披緇虗消信施辜負師德有何益哉實要與諸佛諸祖同儔須將生死兩字竪在眉毛上猶如負千斤擔子過竹排相似轉不得頭眨不得眼移不得足四肢動不得惟有一副惺惺心腸想到彼岸如此用心可謂之初心學道工夫也至於佛祖同儔及悟之一字尚未沾著在博山請雪關大師龕歸博之東峰塢建塔瀛山阻之示衆幾片白雲彌西嶂一輪紅日落東山如驢井井驢大似往來瀛博間祇如恁麼舉且道是瀛山耶博山耶咦落霞與孤鶩齊飛秋水共長天一色示衆古人建立叢林為陶凡鑄聖之址修禪植福之基鎔積習之錮蔽磨纍垢之瞑垢不蠲心地無由明徹習不消禪源曷能洞透非謂不透不明誠恐更增其蔽耳欲得清淨無垢須要時時恆正日日新鮮工夫一氣做成莫云明朝後日發起本有之心頓開現成之志有日撞著磕著豁然洞徹如月皎星輝始信現成不謬方知瞑所蔽者箇宛爾猶存光陰易邁時不待人此生若不明徹來生又更來生契經云我與釋迦如來同為凡夫世尊成道以來塵沙劫數而我耽染六塵輪回生死如此明言豈不痛哉豈不痛哉示衆打相云咄只許聞不許覩賓非賓主非主佛非佛祖非祖且道畢竟是箇什麼咦淨地上不行肯向糞堆取然雖如此也要箇通事人始得示衆喝一喝云且道者一喝落在什麼處良久云空谷傳聲易虗堂習聽難堂中示衆諸仁者各各腳跟下從無量劫來昧自己一段大事此生若不明徹去又是來生再生未必是何面目也若要明徹大事稱此光陰莫順流俗幸棲梵剎理行雙修立箇決定志發箇勇猛心時時照顧自己主人公念念相續莫令走作忽有走作急切追尋何處失落者一念或一度或二度三度自然定帖信麼行過方知倒此一著更加精進歷歷明明若不見主人公誓不休志二六時中猶如打毬相似睜著兩眼照顧來機任彼色相諸緣亦不暇顧如此用心或一月兩月三月五月若不親見主人公古人道截取老僧頭去諸仁者此事不論靈利聰明初心遠學惟要真切實究始得豈不見香嚴智間禪師初參百丈丈遷化復參溈山山問聞汝在百丈先師處問一答十問十答百此是汝聰明靈利意解識想生死根本父母未生時試道一句看嚴被一問直得茫然平日看過文字要尋一句酬對竟不可得乃自嘆曰畫餅不可充飢乃泣辭溈山過南陽覩忠國師遺迹遂憩止焉一日芟除草木偶拋瓦礫擊竹作聲忽然省悟作偈曰一擊忘所知更不假修持動容揚古路不墮悄然機處處無蹤迹聲色外威儀諸方達道者咸言上上機溈山聞得謂仰山曰此子徹也仰曰待某甲親勘仰曰聞師弟發明大事試説看嚴舉前頌仰曰若有正悟別更説看嚴作頌曰去年貧未是貧今年貧始是貧去年貧猶有卓錐之地今年貧錐也無仰曰如來禪許師弟會祖師禪未夢見在嚴復頌曰我有一機瞬目視伊若人不會別喚沙彌仰乃報溈曰且喜間師弟會祖師禪也此是參禪悟道勇猛的樣子豈可作容易看也或曰未見參禪工夫只聞擊竹便悟曰不見溈山一問直得茫然尋一句酬對竟不可得乃泣辭溈山別參工夫可知之也要見主人公麼第一莫昧自己虗實得失是非無量劫來昧主人公只為此也第二莫粧好漢作了事人遇境隨情逢緣放意自謂理事融通恁麼好漢黑面老人簡點去也第三莫向册子上尋討記持語句凖備待人作師範想如此學道欲明徹無量劫來昧大事遠之遠矣珍重示衆參禪客莫論禪須當實悟始方圓應機接物通玄妙總在窮元不在宣豈不見如何禪猻猢上樹尾連顛苟能徹透乾坤外也解無言説有言參禪客莫學禪貴在深操立志淵古聖曾經三十載休將容易有時緣豈不見如何禪石上蓮花火裏泉㘞地一聲全體現虗空粉碎髓漫天參禪客莫待禪七箇蒲團沒半邊夜坐針錐猶未徹枕頭墮地始通玄豈不見如何禪猛火𦦨裏著油煎破古人消息子拿雲浪總為緣參禪客莫問禪須知到岸自安然話頭端的非饒舌大好山中契別傳豈不見如何禪大家洗腳上牀眠忽爾蛙聲天地窄自歌自唱哩囉嗹示衆祇者箇無祕訣展開珍藏向人説縱然説得十分明也似紅爐飛片雪只如老僧恁麼道還有祕訣也無良久云禪者且置居士作麼生然雖如此也不得無語豈不聞三人同行必有我師其或未然向下文長付在來日頌古世尊拈花經綸萬丈探深淵誰想深淵徹底穿縱遇金鱗開口笑長江依舊水連天足現雙趺抒乾滄海元非妙擊碎須彌未是珍惟有死貓頭忽現大千沙界露全身産難因緣一箇穿雲帶霧一箇遇水安排三箇同隻鼻孔儘他石女懷胎無縫塔洞庭湖裏耍鞦韆獨有盲龜看得全無影樹頭花倒影琉璃殿上錦鋪磚不求諸聖不重己靈情知跨海弄天涯蓋為虗玄已破家莫道無心稱妙手無心猶是眼中花德山拓鉢無端托鉢向人寰暗驗明瞞倒剎竿末後密通真可怕驢年誰解此連環婆子燒菴者老婆無眼力辨金全借石頭識趂出燒菴也太奇豈知遍地生荊棘趙州無字泰山傾倒壓蟭螟氣絶心灰識浪平不是泥牛開隻眼焉知猛虎坐中廳一歸何處萬法歸一亦無端七斤重也太顢頇非顢頇任君看稱在星兮星在盤不在盤金烏跳上玉欄干麻三斤麻三斤徹骨貧稱錘墮地白如銀要會麼莫疏親黃龍峰下巾珍彬柏樹子舌頭無骨遍稱尊好歹收來作話文囫圇一聲天地黑波斯吞却鐵崑崙狗子佛性有無趙州古佛最崎嶠摸著頭兮失却腰始見南泉稱萬福爪牙獨露不相饒雲門餅雲門餅空掘井天下衲僧徒畫影超佛越祖未足奇為驢作馬孰不令三日吐光而終黃金贈富渾無事破體袈裟説向誰昨夜三更收麥子天明徒見磨房推黃龍三關我手佛手擔枷帶杻信口道來露出家醜我腳驢腳切忌卜度伸縮自由踏翻五嶽人有生緣不必重宣沒毛老虎也解發顛問答道璞禪人問楞嚴經云知見立知即無明本知見無見斯即涅槃瑞鹿安楞嚴云知見立知即無明本知見無見斯即涅槃先師翁云知見無見即無明本知見立知斯即涅槃二大老與經意是同是別有優劣無優劣答頌三箇老渠真古怪一條拄杖攪翻天縱使神機并妙用優劣何曾到彼邊問華嚴以法界為宗法界又以何為宗答頌一輪明月印千江千江明月一輪藏透得毗盧華藏界全身普現法中王問某甲在病中先博山示云外其身而身存如何是存的身答頌虗空生來無背面只見虗空生閃電內外通明惟一真孰能識此空王見問外的身與存的身是一是二若道是二理應不二若道是一用外作麼答頌老僧從來不識數只會剛剛恰好處應用無妨格外機知其端的難酬措問先師翁從早停筯弄钁頭到晚便自負云已到百丈堂奧如云一日不作一日不食此猶滯在半途畢竟百丈堂奧在甚麼處答頌鼻頭扭痛笑呵呵獨恨當初老達磨不到好山親切處爭能跳出好山窩問新博山禪鏡序云大圓鏡裏説箇禪字早是痕生某甲問云説禪字的痕與説大圓鏡的痕所差多少山云爾又加一痕也然則無痕一句作麼生道答頌本來無物痕何有強立名言論我人一喝頓空千古迹何妨劫外起風塵問古德云生時決定生去時實不去意旨如何答頌來去無端事果奇嵐風輕送白雲歸金烏玉兔東西走明暗何曾離得伊問應無所住而生其心如何是無所住處答頌道人心膽大如天直向空王殿裏眠王老問渠何處客翻身拽杖下西川問三心了不可得點那一箇心簡點將來坐斷三際的亦堪受供養麼答頌三箇貧兒共一家不須苦苦驗龍蛇縱然坐斷僧祇劫受供何嘗免得他問清淨本然云何忽生山河大地且道即已生山河大地仍是清淨本然否答頌那事從來不失傳儘他成壞我無遷老胡一任西流去剩有三千夜不眠問枯木倚寒巖三冬無暖氣婆子燒菴趂出古今嘖嘖嘆賞故知二俱作家然欲不遭燒菴之手且道者僧將作麼生行履答頌神弓一發疾如風那畏銀山千萬重透過自然生慶快燒菴未免枉施工問從來法嗣一枝正出餘皆旁出且道拄杖子有旁正否答頌君命嚴威似箭鋒豈容擬議墮偏中正印相傳千古令安居不昧有無功安止居士問世尊拈花師答曰風色燦然畢竟意旨如何答頌遍地黃金無寸土朧肉眼豈能窺冬殘樹杪含春意日落才昏夜月輝問聞師未入孔聖之門然則者箇消息初見先和尚時便知還是用工後方省答頌憶昔當年學道時寥寥殿閣失支離吾師説法如雷震不肖無聞頓足捶海岸黃居士問善知識入門便鑑具甚麼眼師曰心不負人面無慚色又持陳雲怡督學十六問請師下語問渴鹿趂陽𦦨如何得歇師曰待虗空落地即向爾道問摩尼珠久埋塵土如何急切覓得師曰雪滿紅爐問一斬一切斷如何得此利劒師曰利劒且置將斷的來與老僧驗過問等是水味有品為第一泉有品為第二泉作何分剖師曰我者裏無水亦無味問黑夜中認賊為子認子為賊作何判斷師曰一齊殺却問家親作祟如何處置師曰貶向無生國去問的的主人翁如何得覿面一見師曰露柱子生兒也見麼問堪輿家羅經縱橫移動針必指南是誰作主師曰繫驢橛撼亦不動問電光中良驥瞬息千里如何得一往追上攬轡在手師曰大丈夫跟著驢走作麼問大慧云將八識一刀憑甚麼安身立命師曰眼見如盲問未開口以前為甚麼便棒便喝師曰惡心未除問胡來胡現漢來漢現是鏡體是鏡光師曰三頭六臂問日升月沈雷轟電掣山靜雲間水流花開農歌牧唱婦兒嬉莫非者箇迸現如何得拈向腳跟下要用便用師曰符到奉行問今修行人多怕去後黑漫漫地不知現前黑漫漫地更苦多口説無常生死事大不知現前剎那死死生生更切此際重關一擊如何下手師曰大明門從來不關問高峰云大徹之人本脫生死為甚麼命根不斷命根既不斷呌做大徹徹的何事師曰且把命根呈似老僧著問一句當天八萬門永絶生死者一句如何得恁麼有力師曰上大人可知禮也撫州僧問如何是空手把鋤頭師曰爛却虗空始見髓如何是步行騎水牛師曰石女懷胎産木童如何是人從橋上過師曰十人沉落九箇半如何是橋流水不流師曰三寸麻繩穿火焰抑菴問覿面相呈事若何師曰廩山聳出千峰外云如何對面隔千山師曰洞水回旋萬派收云抱關下寨作麼生抵對師曰寶劒揮空清宇宙云祇如寶華王座上是誰登師曰君臣同和百年春偈師問海岸居士空王話士答曰爛冬瓜遂以偈贈之空王衲子爛冬瓜洞見黃公老作家左右逢源垂妙用杜鵑啼處緑楊斜示塗允心居士當下頓空全體現何須更覓佛陀耶諸祖相傳無剩語惟憑密契絶周遮示璞禪人不明明處是真明明得明兮未是珍直待耳聾三日後方才跳過古關津示弘璆禪人脊梁竪起似條鐵話頭純淨如氷雪翻轉娘生鐵面皮方才跳過佛魔穴示道昆禪人參究念佛念佛是誰誰是佛非心非佛復何物馬師不是好心腸平地掘開三尺窟贈晦杲法姪知君信自一家風觸目全歸大覺宮歷劫圓光非內外多生白淨勿邊中穿山透海渾無迹蓋地遮天曷有蹤密聽薰風消息至洞崖橫架一枝紅示大宗禪人一句話頭明歷歷通天徹地沒行蹤若還不遇窮光棍肯信衣珠在己躬示道允禪人參萬法歸一萬法收歸一箇一諸佛衆生齊了畢何用青州吐白涎令人觸著如膠漆示大根禪人正念相續雜念不生無影樹子必有大根示崕山道隱禪人懸崕撒手付知音豈肯依他向外尋記得古人垂一語前山點首度金針示道定禪人參柏樹子定得乾坤主方知劫外新庭前無柏樹限裏有瞳人示大信禪人參泥牛銜月信得泥牛銜月必定有好時節是甚麼時節夜半烏龜生白鱉示道通禪人通玄一路千聖不傳狗吃麻糍腳爪尾顛示道因禪人果熟根深固因緣會遇時赤骨透心神枯樁爛見髓示塗辛卿居士青山緑水娘生面緑水青山古佛心欲識其中消息處也須驀地一蛙音答道璞禪人泥牛入海渾身冷木馬騰空血汗流玉兔翻身橫宇宙金烏垂手下揚州慈觀禪人以白紙上師師答偈枯木若生華石人不種葩嵐風忙似箭澗水懶如蛇野馬空中鬬間郎室內奢欲知端的旨除是法王家示若愚人參萬法歸一萬法歸一一何歸青州做領布衫衣穿破不須重整理儘他骨露與風吹示警寰禪人參狗子佛性有無趙州挺直如梧狗子佛性道無趙州灣曲如柳柏樹佛性道有壽昌恁麼批判爭怪南辰北斗示協和禪人一句話頭如皎月通身透露復阿誰直饒突出摩醯眼鼻孔從來向下垂文學張九生請示念佛是誰一句無縫語尋原莫問誰胸中如著刺意外若寒灰甕裏難逃鱉巖深易捉龜天明開曉徑平地一聲雷寄海岸居士殺活從來付作家倒拈拄杖驗龍蛇真古怪沒些些却被黃公破他咄也不得眼花答黃安止居士來不來往不往大丈夫莫鹵莽親磕著非勉強覿面相呈不用參鐵關碎也透珠網簫曲峰頭老凍膿鼻孔從來無半兩示道煥禪人活中得活不為奇貴在當人變化機絶後再蘇欺不得方知下雨不沾泥示大力禪人字靜隱其大如空其力如風其靜無迹其隱無蹤如斯要妙盡在其中示以白禪人住山懸崖獨立付其人不是其人莫可親不到古人親切處肯將身伴白雲眠讚壽昌先老和尚稽首吾師大和尚謾把鋤頭當拄杖腥臭遍滿太虗中觸著盲聾心地悵信口千般無端萬狀指瓦礫而作黃金按須彌而為白浪機應鋒鋩起死活葬生平祇許半箇人鐵面慈容逢之膽喪不肖巾侍二十餘年嘗云不與説破者箇模樣鄒雪菴居士小像此老最崎嶠到也有些妙解下腰帶來露出胸中竅且道是那一竅咦孤峰嶺上唱玄歌十字街頭人不曉凜然師兄吾兄赤灑灑長坐青松下手提百八珠擬入東林社或問西來意若何高聲連呌澄侍者咦也是呼牛作馬自題門人道璞請元公居士有讚你是阿誰從來不見今朝敗露向人前大似虗空之閃電三二十年藏迹蹤却被海岸黃公索騙果然捉賊已追贓神機鬼計莫思算雖是沒要緊的東西到此難以批判咦也是秦時鍍鑠鑽又道因禪人請者等模樣似箇甚麼渠不似渠我不似我説似一物舌頭便墮咦莫是洞上一枝花水中千萬朵咄誰敢擔荷又本善禪人請者箇潦倒漢子俗氣剛強無比自任己見非常惹得傍觀憂喜三二十年露爪張牙五六十白藏頭縮尾無端遺臭大方只得吞聲忍氣噫若是曹溪嫡子決定不容你上紙又知豫禪人請者箇老㲯𣯶平懷難相觸舌上若林檎心中如鴆毒行藏若風顛談玄似叢竹三莖兩莖斜四莖五莖曲咦苦瓜叢裏一聲蛙知豫禪人須當自玉又不移禪人請者箇老翁有甚奇特眼耳鼻舌俱同穿衣喫飯無別只有一處不同且道那一處咦黃龍峰頭七凹八凸又本虛禪人請者箇老漢似像非像雖則無我無人到也有些怪樣天堂地獄無你分且在人間作箇供養佛事為瀛山雪關和尚封龕瀛山古佛月皎風清寂後一笑坐斷羣英坐斷且置祇如大師即今在甚麼處安身立命咦無縫龕中傳正令大家齊聽帝嘟叮珍重舉畢二僧釘龕捶聲交嚮一僧有省圓明菴皎然舉火執火把打相云會麼者箇光明藏古今不覆藏今日重新舉大地放毫光且道放光後又作麼生珍重自在不必商量然雖如是畢竟向甚麼處安身立命聻噫紅爐飛片雪直往九蓮鄉行實己卯師在新城龍湖寺海岸居士偕諸弟子請説行實師允其請述曰山僧名元謐字見如一字閴然建昌南城胡氏子也父名富母寧氏父入閩是夜夢産豫及歸果符其兆乃萬曆己卯年十二月初三日也老宿文雅見之曰此兒氣象不常異日必能成器不親儒業惟樂恬靜一日偶隨父至寶方謁無明經和尚傾服道風明旦獨往寶方求開示和尚異之遂示偈曰本地風光騰法界十方清淨絶微塵含天裹地渾無物釋道儒宗謾有名且囑以晝夜力參毋忘者著其年二十一歲遂斷葷酒浹月後至寶方求剃度和尚以親在難之豫知和尚婆心遂抵撫州禮金山鎧法師祝髮師精講論專意禪那每示以坐禪工夫豫奉命孜孜不懈師見豫如此每禮拜不受曰吾不如子也明年回寶方充火頭父母猶眷戀不已豫大呼曰吾非汝子母見豫意決乃歸豫曰古人云恩愛斷則生死斷果如也勗菴見豫志氣啓和尚曰謐師弟雖後生却有老成之作和尚可垂方便度之和尚一日至竈前看竈內曰欲得飯熟須是火焰裏轉身見壁始得豫即提此語晝夜參究越七八日夜立殿後至三更身心俱寂忽自念云水上蓮花火裏生次早上方丈禮拜曰前日蒙和尚指示火焰裏轉身見壁某甲有箇會處和尚曰試説看豫曰水上蓮花火裏生和尚曰水上蓮花火裏豈能生耶豫無語和尚曰光未透在且去勗師兄聞之曰和尚勘驗分明汝自不省耳和尚往少室豫躡蹤追至舟中時大衆課誦豫默然和尚詰之對曰不識字和尚訶曰無相之道尚可悟明有相之法又何難乎於是從學和尚少室歸結制峨峰博山來師兄為首座豫遂邀同志兄弟十餘人坐禪立誓夜不放參座一夕入堂同坐偶昏寐豫大呼曰燈盞無油光不明座曰管間事豫曰也不可放過座一日與西堂向火次豫近前禮拜曰昨在一片間地上拾得一枚針却無鼻孔請首座師兄為穿座曰取紙筆來豫即禮拜而去一日和尚與龍泉瑩兄論世尊良久因緣豫近前問曰是何道理瑩曰無汝分豫曰前日和尚示衆云人人有分為甚某甲獨無和尚曰汝既有分為甚求人豫無言可對和尚示頌曰當知有如意黃金非是貴雖是死蛇頭確有超人志豫聞不覺淚下於是晝夜力參五臟火攻鼻唇焦爛和尚見之曰用工不宜太過豫曰幸有氣在半載見壁上帖前頌擡頭恍如暗室得燈大笑不已關主旺兄曰笑什麼豫曰今日方知死活也一日龍泉勗菴本空三人論夾山與定山因緣一曰生死中無佛則無生死一曰生死中有佛則不迷生死勗曰無佛是空曰有佛是泉斷本空三十杖豫曰道是道非俱三十杖斷是非亦三十杖泉即送五燈會元一部曰賢弟看得會元也復請師兄點及音釋曰須自看看不去處便有好消息在偶閲至外道問迦葉尊者如何是我我者曰覓我者是汝我外道曰者箇是我我師我何在者曰汝問我覓讀三晝夜句讀不明至第四日早喫粥忽然明得一箇我字如開關放水相似義理朗然如日中天一日佑師兄示看楞嚴經中一切衆生從無始來迷己為物失於本心為物所轉若能轉物即同如來每提轉物二字越三月與瑩兄上峩峯午齋舉匙念至迷己為物身心如虗空相似放下飯匙問瑩兄曰此理如何瑩曰能轉前境乎豫曰不然瑩曰知覺乃衆生是何道理豫曰兄有知覺在瑩曰吾不若耳至寶方禮佑兄問曰若能轉物即同如來是何道理佑曰萬物好醜汝能轉乎豫大笑曰不是不是佑曰試説看豫曰不説破不説破佑曰為甚不説豫曰若説破是陳貨遂書偈以答曰一箇泥牛百尺欄無頭無尾沒中邊斯牛遍滿三千界大小無形裹世間佑曰畢竟是何物豫曰蛇吞蝦蟆眼睛突出佑曰師弟已超我也豫嘗謂做工夫無別法只是不令一念走作間斷又要亦不知有走作間斷惟飯時多忘制三度方定所以提飯匙方才摸著自己鼻孔不借他人面目此事實不敢虗誑也一日白和尚曰慈母深恩何以報之和尚曰除是明心見性豫曰請和尚方便和尚曰就看父母未生時是何面目一回悟徹則歷劫父母之恩普報也豫遂往金樓蘭若誓不設單日應諸務夜則坐立衣不整帶狼藉厭人孜孜以此面目二字時刻不忘越一月拽磨撞磨盤忽然有省遂作偈曰本來面目不須尋一點靈明亘古今和尚問我本來面巾珍彬真欣鄰仁走寶方禮和尚呈偈和尚曰前三句則不問後一句是如何豫曰不可雪上更加霜也和尚曰今日且放過豫禮謝回金樓復看如何是道一日坐菜園至五更衣帽俱溼猛舉一聲如何是道忽蝦蟆連呌三聲當下身心光景無一法可喻也方知森羅萬象盡是自己一段光明遂作偈曰虗空逼塞一聲蛙水鳥含靈共一家十字街頭親著眼自歌自唱哩蓮花寄語瑩兄曰金樓蝦蟆昨夜跳上三十三天去也瑩云雖然如是也須勘過始得豫聞曰早已勘過了也瑩遂白和尚謐師弟又脫一件布衫也後晤瑩兄曰我十二年方明此事賢弟根器如此石菴著兄見之曰弗覺師弟已至此乎吾做工夫時行至叉路頭不知今日向何處去十數年方得省發也寶方結制博山來師兄為首座豫充維那和尚一日示僧看臨濟三頓棒因緣豫作偈呈和尚有須當痛處知之句和尚曰汝道痛處即是三歲孩兒也解恁麼説次日復呈偈有棒下活牟尼之句和尚曰汝道棒下即是也須撞著棒頭始得豫憤然而出一日一夜寢食俱忘至第二日早課後上單悶然似睡似醒忽一金甲人按豫胸曰今日和尚為師決擇公案覺而有省遂書偈曰問處其中的婆心絶迹椎抱贓呌屈漢的的在何居和尚見之即示偈曰問處情真切慈心只是椎大愚不説破瞥地始安居騎虎頭把虎尾棒喝宗風從此起吊轉佛祖鐵心腸誰云佛法無多子豫再拜問曰麻三斤三腳驢兒弄蹄行杖林山下竹筋鞭請和尚道一句和尚曰汝道一句看豫曰道也不難只恐泄破和尚曰須是轉身通氣始得豫作禮而退和尚復喚云如何是佛豫掩耳而出一日和尚見豫趺坐問曰在此作麼豫不答和尚曰啞乎豫亦不答和尚曰真箇耶豫下禪牀曰和尚也不可向髓中覓骨和尚曰畢竟如何豫曰銚柄杓和尚曰今日且放過一日茶房喫茶次著師兄問曰在此作什麼豫曰喫茶著曰將甚麼喫豫拈柴頭拗折作聲著大笑而去傍僧曰意旨如何豫曰著兄被茶燒嘴徹痛耳一日啓和尚曰只如參罷後又作麼生和尚示偈曰參罷於中事若何無風水處解生波乾坤撥亂酬先德提掇南無薩怛哆豫禮謝是冬結制命豫西堂首衆丁巳謁五臺會諸耆德略談宗門中事遂有北京返錫金陵遇覺浪法姪於天界方知和尚示寂悲痛無聊先和尚臨終以衲衣付豫豫欲遠遁無奈海岸黃公一時冤家聚頭耳丁卯黃公憩匡山開先寺參柏樹子話忽然有省作頌并書寄豫曰今日始知先和尚用處也豫讀頌并書嘆曰名利場中尚能若此出家兒不明此事誠可悲哉遂作偈酬之公歸邀諸護法居士請豫開堂豫曰某福輕慧淺恐辱宗門耳衆護法居士作禮而退丙子十月聞覺浪大師至匡山遂遣人迎歸壽昌主先和尚法席開堂説法至丁丑春自負杖鉢出山大衆竟無一知者師出山往閩之建寧及掃塔博山後浪大師別請司理黃元公迎歸住持師住壽昌前後二十餘年叢林未備者師悉備之晚年寶方回祿師復重造又復興本邑龍湖禪寺不歲完成師寂于己丑世壽七十有一僧臘五十有語録一册太宰李夢白司理黃元公序行於世塔于本寺龍岡之麓太史鄧來沙居士銘之門人道璞立石
